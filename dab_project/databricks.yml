# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: 0a0970fd-f106-4b9b-ad18-5a518f89e174

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
    default: 'citibike_dev'
  schema:
    description: The schema to use
  

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-5534740f-a1f9.cloud.databricks.com
      root_path: /Workspace/Users/alviswhyi@gmail.com/.bundledev/${bundle.name}/${bundle.target}
    variables:
      catalog: dba_catalog
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    presets:
      name_prefix: '[prod]'
    workspace:
      host: https://dbc-5534740f-a1f9.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/alviswhyi@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/alviswhyi@gmail.com/.bundleprod/${bundle.name}/${bundle.target}
    variables:
      catalog: 
        default: "citibike_test"
      schema: prod
    permissions:
      - user_name: alviswhyi@gmail.com
        level: CAN_MANAGE
